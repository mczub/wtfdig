name: Validate Strat Data

on:
  pull_request:
    branches: [main]

jobs:
  tier1:
    name: Tier 1 – Structural Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run test:tier1
